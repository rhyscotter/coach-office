<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Coach's Office</title>
<style>
  :root{
    --panel:rgba(17,17,17,.88);
    --border:rgba(255,255,255,.10);
    --text:#fff;
    --muted:rgba(255,255,255,.62);

    /* ✅ THESE GET OVERRIDDEN BY CLUB THEME */
    --accent:#7B2EFF;
    --accent2:#B266FF;
    --clubGlow: rgba(123,46,255,.18);
  }
  *{box-sizing:border-box}
  body{margin:0;background:transparent;color:var(--text);font-family:Arial,sans-serif}
  .stage{
    min-height:100vh;padding:22px;
    background:
      radial-gradient(1000px 600px at 20% -10%, rgba(255,255,255,.05), transparent 60%),
      linear-gradient(180deg,#000 0%,#050505 100%);
    position:relative;overflow:hidden;
  }
  .stage::before{
    content:"";position:absolute; inset:-40% -20%;
    transform:rotate(-14deg);
    background:linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.05), rgba(255,255,255,0));
    opacity:.18;pointer-events:none;
  }
  .stage::after{
    content:"";position:absolute; inset:0;
    background:radial-gradient(800px 520px at 80% 18%, var(--clubGlow), transparent 62%);
    opacity:.9;pointer-events:none;
    animation:glowPulse 2.8s ease-in-out infinite;
  }
  @keyframes glowPulse{ 0%{opacity:.55} 50%{opacity:1} 100%{opacity:.55} }

  .wrap{max-width:980px;margin:0 auto;position:relative;z-index:2}

  .title{
    font-family:Impact,Haettenschweiler,'Arial Narrow Bold',sans-serif;
    font-size:52px;text-transform:uppercase;letter-spacing:1px;line-height:1;
    position:relative;padding-bottom:10px;
  }
  .title::after{
    content:"";position:absolute;left:0;bottom:0;height:6px;width:100%;
    border-radius:999px;
    background:linear-gradient(90deg, var(--accent), transparent);
    animation:underlineSweep 1.8s linear infinite;
  }
  @keyframes underlineSweep{
    0%{filter:brightness(1); transform:translateX(-2px)}
    50%{filter:brightness(1.12); transform:translateX(2px)}
    100%{filter:brightness(1); transform:translateX(-2px)}
  }

  .sub{color:var(--muted);font-size:13px;margin-top:6px;max-width:650px}

  /* ✅ subtle coach line */
  .coachLine{
    margin-top:8px;
    color:rgba(255,255,255,.62);
    font-size:12px;
    font-weight:900;
    letter-spacing:.8px;
    text-transform:uppercase;
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
  }
  .coachDot{
    width:8px;height:8px;border-radius:999px;
    background:var(--accent);
    box-shadow:0 0 18px var(--clubGlow);
    opacity:.9;
  }
  .coachName{
    color:rgba(255,255,255,.92);
    font-weight:900;
    letter-spacing:.2px;
  }

  .grid{margin-top:16px;display:grid;grid-template-columns:1.05fr .95fr;gap:14px}
  @media (max-width: 860px){.grid{grid-template-columns:1fr}}

  .panel{
    background:rgba(17,17,17,.88);
    border:1px solid rgba(255,255,255,.10);
    border-radius:18px;padding:14px;position:relative;overflow:hidden;
  }
  .panel::before{
    content:"";position:absolute; inset:-60% -20%;
    transform:rotate(-12deg);
    background:linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.05), rgba(255,255,255,0));
    opacity:.22;pointer-events:none;
  }
  .panelInner{position:relative;z-index:2}

  .h2{
    font-family:Impact,Haettenschweiler,'Arial Narrow Bold',sans-serif;
    font-size:26px;text-transform:uppercase;letter-spacing:.8px;margin:0;padding-bottom:8px;
    position:relative;
  }
  .h2::after{
    content:"";position:absolute;left:0;bottom:0;height:4px;width:100%;
    border-radius:999px;background:linear-gradient(90deg, var(--accent), transparent);
    transform:scaleX(.35);transform-origin:left;transition:.18s ease;opacity:.95;
  }
  .panel:hover .h2::after{transform:scaleX(1)}

  .tiny{color:rgba(255,255,255,.62);font-size:12px;margin-top:10px}

  /* Pills */
  .pillRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
  .pill{
    display:inline-flex;align-items:center;gap:8px;
    padding:10px 12px;border-radius:999px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.14);
    color:#fff;font-weight:900;letter-spacing:.6px;text-transform:uppercase;
  }
  .pill strong{font-family:Impact,Haettenschweiler,'Arial Narrow Bold',sans-serif;font-size:18px;letter-spacing:.8px}
  .glow{box-shadow:0 0 0 1px rgba(255,255,255,.04), 0 0 32px var(--clubGlow);}

  /* ✅ MENU layout (cards) */
  .menuGrid{
    margin-top:12px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  @media (max-width: 520px){.menuGrid{grid-template-columns:1fr}}
  .menuCard{
    text-align:left;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.10);
    background:rgba(255,255,255,.03);
    padding:12px;
    cursor:pointer;
    transition:.14s ease;
    position:relative;
    overflow:hidden;
  }
  .menuCard::after{
    content:"";position:absolute;left:12px;right:12px;bottom:10px;height:4px;border-radius:999px;
    background:linear-gradient(90deg, var(--accent), transparent);
    transform:scaleX(0);transform-origin:left;transition:.18s ease;opacity:.95;
  }
  .menuCard:hover{
    background:rgba(255,255,255,.06);
    border-color:rgba(255,255,255,.16);
    transform:translateY(-1px);
    box-shadow:0 0 26px var(--clubGlow);
  }
  .menuCard:hover::after{transform:scaleX(1)}
  .menuTitle{
    font-weight:900;
    letter-spacing:.6px;
    text-transform:uppercase;
    font-size:12px;
    color:rgba(255,255,255,.92);
  }
  .menuDesc{
    margin-top:6px;
    color:rgba(255,255,255,.62);
    font-size:12px;
    line-height:1.4;
  }
  .menuBadge{
    display:inline-flex;
    margin-top:10px;
    padding:6px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.04);
    font-weight:900;
    letter-spacing:.8px;
    text-transform:uppercase;
    font-size:11px;
    color:rgba(255,255,255,.92);
  }

  /* To-do UI */
  .todoTop{
    display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px;
  }
  .input{
    flex:1;min-width:220px;
    border-radius:14px;padding:12px 12px;
    border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.03);
    color:#fff;outline:none;
  }
  .input::placeholder{color:rgba(255,255,255,.45)}
  .todoList{margin-top:12px;display:flex;flex-direction:column;gap:8px}
  .todoItem{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    border:1px solid rgba(255,255,255,.10);
    background:rgba(255,255,255,.03);
    border-radius:14px;padding:10px 10px;transition:.14s ease;
  }
  .todoItem:hover{
    background:rgba(255,255,255,.06);
    border-color:rgba(255,255,255,.16);
    transform:translateY(-1px);
    box-shadow:0 0 26px var(--clubGlow);
  }
  .todoText{
    font-weight:900;letter-spacing:.2px;
    color:rgba(255,255,255,.92);
    word-break:break-word;
  }
  .todoMeta{
    margin-top:2px;color:rgba(255,255,255,.62);
    font-size:11px;text-transform:uppercase;letter-spacing:.8px;font-weight:900;
  }
  .todoLeft{display:flex;flex-direction:column}
  .iconBtn{
    width:40px;height:40px;border-radius:14px;
    border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.04);
    cursor:pointer;transition:.14s ease;
    display:flex;align-items:center;justify-content:center;
  }
  .iconBtn:hover{
    background:rgba(255,255,255,.08);
    border-color:rgba(255,255,255,.18);
    box-shadow:0 0 22px var(--clubGlow);
    transform:translateY(-1px);
  }
  .iconBtn svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;opacity:.9}
  .empty{
    border:1px dashed rgba(255,255,255,.18);
    background:rgba(255,255,255,.02);
    border-radius:14px;padding:12px;color:rgba(255,255,255,.62);
    font-weight:900;letter-spacing:.4px;text-transform:uppercase;font-size:11px;
  }

  .navBtn{
    padding:12px 14px;border-radius:16px;border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.04);color:#fff;font-weight:900;letter-spacing:.7px;text-transform:uppercase;
    cursor:pointer;transition:.14s ease;position:relative;overflow:hidden;
  }
  .navBtn::after{
    content:"";position:absolute;left:12px;right:12px;bottom:10px;height:4px;border-radius:999px;
    background:linear-gradient(90deg, var(--accent), transparent);
    transform:scaleX(0);transform-origin:left;transition:.18s ease;opacity:.95;
  }
  .navBtn:hover{
    transform:translateY(-1px);background:rgba(255,255,255,.08);
    border-color:rgba(255,255,255,.18);box-shadow:0 0 28px var(--clubGlow);
  }
  .navBtn:hover::after{transform:scaleX(1)}
  .navBtn:active{transform:translateY(0px) scale(.99)}

  .err{margin-top:14px;color:#fff;background:rgba(255,0,0,.12);border:1px solid rgba(255,0,0,.35);padding:12px;border-radius:14px}
</style>
</head>

<body>
  <div class="stage">
    <div class="wrap">
      <div class="title">Coach’s Office</div>
      <div class="sub" id="subtitle">Your tools, shortcuts, and to-do list — all in one place.</div>

      <!-- ✅ coach line only -->
      <div class="coachLine" id="coachLine">
        <span class="coachDot" aria-hidden="true"></span>
        <span>Coach:</span>
        <span class="coachName" id="coachNameText">—</span>
      </div>

      <div class="grid">
        <!-- LEFT: MENU -->
        <div class="panel">
          <div class="panelInner">
            <div class="h2">Menu</div>
            <div class="sub" style="margin-top:6px">
              Choose where you want to go.
            </div>

            <div class="menuGrid">
              <button class="menuCard" id="btnPlayerDev" type="button">
                <div class="menuTitle">Player Development</div>
                <div class="menuDesc">IDPs, goals, feedback, progress tracking.</div>
                <div class="menuBadge">Go</div>
              </button>

              <button class="menuCard" id="btnSessionPlanning" type="button">
                <div class="menuTitle">Session Planning</div>
                <div class="menuDesc">Build sessions, patterns, diagrams, clips.</div>
                <div class="menuBadge">Go</div>
              </button>

              <button class="menuCard" id="btnCoachDashboard" type="button">
                <div class="menuTitle">Coach Dashboard</div>
                <div class="menuDesc">Schedule, team tools, alerts, admin.</div>
                <div class="menuBadge">Go</div>
              </button>

              <button class="menuCard" id="btnModules" type="button">
                <div class="menuTitle">Modules</div>
                <div class="menuDesc">Learning content, curriculum, notes.</div>
                <div class="menuBadge">Go</div>
              </button>

              <!-- ✅ Added Schedule List (requested route) -->
              <button class="menuCard" id="btnScheduleList" type="button" style="grid-column: 1 / -1;">
                <div class="menuTitle">Schedule List</div>
                <div class="menuDesc">View all upcoming events and sessions.</div>
                <div class="menuBadge">Go</div>
              </button>
            </div>

            <div class="tiny" id="actionStatus">Ready.</div>
            <div id="error"></div>
          </div>
        </div>

        <!-- RIGHT: To-do list -->
        <div class="panel">
          <div class="panelInner">
            <div class="h2">To-Do</div>

            <!-- ✅ Items pill moved here -->
            <div class="pillRow">
              <div class="pill glow"><span>Items:</span> <strong id="todoCount">0</strong></div>
            </div>

            <div class="todoTop">
              <input class="input" id="todoInput" placeholder="Add a new to-do (e.g., 'Build out 3-2-2-1 patterns')"/>
              <button class="navBtn" id="btnAddTodo" type="button">Add</button>
            </div>

            <div class="todoList" id="todoList"></div>

            <div class="tiny">
              Stored in this browser (localStorage).
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  // ----------------------------
  // Theming: prefer payload.theme
  // ----------------------------
  function applyThemeFromPayload(payload){
    const theme = payload?.theme || null;
    const accent  = (theme?.accent  || "#7B2EFF");
    const accent2 = (theme?.accent2 || accent);
    const glow    = (theme?.glow    || "rgba(123,46,255,.18)");
    const r = document.documentElement.style;
    r.setProperty("--accent", accent);
    r.setProperty("--accent2", accent2);
    r.setProperty("--clubGlow", glow);
  }

  function safe(s){ return String(s ?? "").replace(/[<>]/g,""); }
  const $error = document.getElementById("error");
  function setError(msg){ $error.innerHTML = msg ? `<div class="err">${safe(msg)}</div>` : ""; }

  const $coachNameText = document.getElementById("coachNameText");
  const $todoCount  = document.getElementById("todoCount");
  const $actionStatus = document.getElementById("actionStatus");

  const $btnPlayerDev = document.getElementById("btnPlayerDev");
  const $btnSessionPlanning = document.getElementById("btnSessionPlanning");
  const $btnCoachDashboard = document.getElementById("btnCoachDashboard");
  const $btnModules = document.getElementById("btnModules");
  const $btnScheduleList = document.getElementById("btnScheduleList");

  const $todoInput = document.getElementById("todoInput");
  const $btnAddTodo = document.getElementById("btnAddTodo");
  const $todoList = document.getElementById("todoList");

  // ----------------------------
  // Wix navigation helper
  // ----------------------------
  // ✅ Use postMessage to parent (Wix) to navigate.
  // ✅ Wix page code should listen for COACH_OFFICE_NAVIGATE and call wixLocation.to(path)
  function navigateTo(path){
    setError("");
    $actionStatus.textContent = "Opening…";
    try{
      window.parent.postMessage({ type:"COACH_OFFICE_NAVIGATE", path }, "*");
    }catch(_){}
    setTimeout(()=> { $actionStatus.textContent = "Ready."; }, 900);
  }

  // Requested routes
  $btnPlayerDev.addEventListener("click", ()=> navigateTo("/player-development"));
  $btnSessionPlanning.addEventListener("click", ()=> navigateTo("/session-planning"));
  $btnCoachDashboard.addEventListener("click", ()=> navigateTo("/coach-dashboard-v2"));
  $btnModules.addEventListener("click", ()=> navigateTo("/modules-homepage"));
  $btnScheduleList.addEventListener("click", ()=> navigateTo("/schedule-list"));

  // ----------------------------
  // To-do storage
  // ----------------------------
  const LS_KEY = "coachOffice.todos.v1";

  function loadTodos(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      const arr = raw ? JSON.parse(raw) : [];
      return Array.isArray(arr) ? arr : [];
    }catch(_){
      return [];
    }
  }
  function saveTodos(arr){
    localStorage.setItem(LS_KEY, JSON.stringify(arr || []));
  }

  let todos = loadTodos();

  function fmtStamp(ts){
    try{
      const d = new Date(ts);
      return new Intl.DateTimeFormat(undefined,{month:"short",day:"numeric"}).format(d);
    }catch(_){
      return "";
    }
  }

  function renderTodos(){
    $todoCount.textContent = String(todos.length);

    $todoList.innerHTML = "";
    if (!todos.length){
      const div = document.createElement("div");
      div.className = "empty";
      div.textContent = "No to-dos yet — add one above.";
      $todoList.appendChild(div);
      return;
    }

    todos.forEach((t, idx) => {
      const div = document.createElement("div");
      div.className = "todoItem";

      const left = document.createElement("div");
      left.className = "todoLeft";

      const text = document.createElement("div");
      text.className = "todoText";
      text.textContent = String(t.text || "");

      const meta = document.createElement("div");
      meta.className = "todoMeta";
      meta.textContent = t.createdAt ? ("Added " + fmtStamp(t.createdAt)) : "Added";

      left.appendChild(text);
      left.appendChild(meta);

      const del = document.createElement("button");
      del.className = "iconBtn";
      del.setAttribute("aria-label","Delete");
      del.innerHTML = `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 6h18"></path>
          <path d="M8 6V4h8v2"></path>
          <path d="M6 6l1 16h10l1-16"></path>
          <path d="M10 11v6"></path>
          <path d="M14 11v6"></path>
        </svg>
      `;
      del.addEventListener("click", () => {
        todos.splice(idx, 1);
        saveTodos(todos);
        renderTodos();
      });

      div.appendChild(left);
      div.appendChild(del);
      $todoList.appendChild(div);
    });
  }

  function addTodoFromInput(){
    setError("");
    const text = String($todoInput.value || "").trim();
    if (!text){
      setError("Please type a to-do item first.");
      return;
    }
    const item = { text, createdAt: Date.now() };
    todos.unshift(item);
    saveTodos(todos);
    $todoInput.value = "";
    renderTodos();
  }

  $btnAddTodo.addEventListener("click", addTodoFromInput);
  $todoInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") addTodoFromInput();
  });

  // ----------------------------
  // Receive init from Wix
  // ----------------------------
  window.addEventListener("message", (ev) => {
    const data = ev.data;
    if (!data) return;

    if (data.type === "COACH_OFFICE_ERROR"){
      setError(data.message || "Something went wrong.");
      return;
    }

    if (data.type === "COACH_OFFICE_INIT"){
      applyThemeFromPayload(data);

      const coachLabel = data.coachName ? String(data.coachName) : "Coach";
      $coachNameText.textContent = coachLabel;

      if (Array.isArray(data.todos)){
        todos = data.todos.map(x => ({
          text: String(x?.text || "").trim(),
          createdAt: x?.createdAt || Date.now()
        })).filter(x => x.text);
        saveTodos(todos);
      }

      renderTodos();
      return;
    }
  });

  // Defaults if Wix never sends init
  $coachNameText.textContent = "Coach";
  renderTodos();

  // Tell Wix iframe is ready
  try { window.parent.postMessage({ type:"IFRAME_READY", view:"coachOffice" }, "*"); } catch(_) {}
</script>
</body>
</html>
